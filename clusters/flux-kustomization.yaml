apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: anubis-app-delivery
  namespace: flux-system
spec:
  interval: 1m
  path: apps/anubis-api/base/environments/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: anubis-app-delivery-source
  targetNamespace: default
  resources:
  - ../aws-load-balancer-controller