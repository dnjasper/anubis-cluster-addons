apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: anubis-app-delivery
  namespace: flux-system
spec:
  interval: 1m
  path: apps/anubis-api/environments/dev   # path inside the secondary repo
  prune: true
  sourceRef:
    kind: GitRepository
    name: anubis-app-delivery-source   # points to your 2nd repo
#  targetNamespace: default