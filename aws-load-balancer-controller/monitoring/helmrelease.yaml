apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  targetNamespace: monitoring
  interval: 10m
  force: true
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=57.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    grafana:
      adminUser: admin
      adminPassword: "Ng7z6aR3StB397KItOUar2U9P0EghLqBvuYOlgZd"
